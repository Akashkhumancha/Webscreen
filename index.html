<!DOCTYPE html>
<html>
<head>
    <title>WebScreen Lite Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; background: #000; border: 2px solid #444; border-radius: 12px; }
        .btn { padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 10px; border: none; }
        #status { color: #ff9800; font-weight: bold; margin: 15px; display: inline-block; }
    </style>
</head>
<body>
    <h1>WebScreen Lite</h1>
    <div id="status">REDMI STATUS: IDLE</div>
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="controls">
        <button class="btn" style="background:#4CAF50; color:white" onclick="trigger('START_STREAM')">START MONITORING</button>
        <button class="btn" style="background:#f44336; color:white" onclick="trigger('STOP_STREAM')">STOP MONITORING</button>
        <button class="btn" style="background:#2196F3; color:white" onclick="document.getElementById('remoteVideo').muted = false">UNMUTE AUDIO</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = { /* YOUR CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const sessionId = "test_session_123";
        const sessionRef = doc(db, "sessions", sessionId);

        let pc = null;
        let remoteSet = false;
        const buffer = [];

        function initPeerConnection() {
            if (pc) pc.close();
            remoteSet = false;
            buffer.length = 0;
            pc = new RTCPeerConnection({
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }, 
                            { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" }]
            });
            pc.ontrack = (e) => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
            pc.onicecandidate = (e) => {
                if (e.candidate) addDoc(collection(db, "sessions", sessionId, "candidates"), {
                    candidate: e.candidate.candidate, sdpMid: e.candidate.sdpMid, 
                    sdpMLineIndex: e.candidate.sdpMLineIndex, origin: "web"
                });
            };
        }

        window.trigger = async (cmd) => {
            if (cmd === 'START_STREAM') {
                initPeerConnection();
                await updateDoc(sessionRef, { command: cmd, offer: null, answer: null });
            } else {
                await updateDoc(sessionRef, { command: cmd });
                if(pc) pc.close();
            }
        };

        async function handleReload() {
            initPeerConnection();
            setTimeout(async () => {
                await updateDoc(sessionRef, { offer: null, answer: null, command: "START_STREAM" });
            }, 1000); // 1s delay to prevent double-start bug
        }

        onSnapshot(sessionRef, async (snap) => {
            const data = snap.data();
            if (data?.offer && pc && !pc.currentRemoteDescription) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await updateDoc(sessionRef, { answer: { type: 'answer', sdp: answer.sdp } });
                remoteSet = true;
                while(buffer.length > 0) pc.addIceCandidate(new RTCIceCandidate(buffer.shift()));
            }
        });

        onSnapshot(query(collection(db, "sessions", sessionId, "candidates"), where("origin", "==", "android")), (snap) => {
            snap.docChanges().forEach(change => {
                if (change.type === "added") {
                    const d = change.doc.data();
                    if (!remoteSet) buffer.push(d); else pc.addIceCandidate(new RTCIceCandidate(d)).catch(()=>{});
                }
            });
        });

        handleReload();
    </script>
</body>
</html>
