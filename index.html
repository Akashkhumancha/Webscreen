<!DOCTYPE html>
<html>
<head>
    <title>WebScreen Lite Pro Viewer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; min-height: 450px; background: #000; border: 2px solid #444; border-radius: 12px; }
        .btn { padding: 15px 35px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 10px; border: none; font-size: 16px; }
        #status { color: #ff9800; font-weight: bold; margin: 15px; padding: 10px; background: #1e1e1e; display: inline-block; border-radius: 20px; }
    </style>
</head>
<body>
    <h1>WebScreen Lite</h1>
    <div id="status">INITIALIZING...</div>
    <br>
    <video id="remoteVideo" autoplay playsinline></video>
    <br>
    <div class="controls">
        <button class="btn" style="background:#4CAF50; color:white" onclick="trigger('START_STREAM')">START MONITORING</button>
        <button class="btn" style="background:#f44336; color:white" onclick="trigger('STOP_STREAM')">STOP MONITORING</button>
        <button class="btn" style="background:#2196F3; color:white" onclick="document.getElementById('remoteVideo').muted = false">UNMUTE AUDIO</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCR--mIMXA96W4CtXPq1KxYptWhKNan5Dg",
            authDomain: "webscreenlite.firebaseapp.com",
            projectId: "webscreenlite",
            storageBucket: "webscreenlite.firebasestorage.app",
            messagingSenderId: "486527120453",
            appId: "1:486527120453:web:e24b8e882b8ec7807d5f2c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const sessionId = "test_session_123";
        const sessionRef = doc(db, "sessions", sessionId);

        let pc = null;
        let remoteSet = false;
        const buffer = [];

        function initPeerConnection() {
            if (pc) pc.close();
            remoteSet = false;
            buffer.length = 0;
            pc = new RTCPeerConnection({
                iceServers: [
                    { urls: "stun:stun.l.google.com:19302" },
                    { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" },
                    { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" }
                ]
            });
            pc.ontrack = (e) => {
                document.getElementById('remoteVideo').srcObject = e.streams[0];
                document.getElementById('status').innerText = "STREAMING LIVE";
                document.getElementById('status').style.color = "#4CAF50";
            };
            pc.onicecandidate = (e) => {
                if (e.candidate) addDoc(collection(db, "sessions", sessionId, "candidates"), {
                    candidate: e.candidate.candidate, sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex, origin: "web"
                });
            };
            pc.oniceconnectionstatechange = () => {
                document.getElementById('status').innerText = "ICE: " + pc.iceConnectionState.toUpperCase();
            };
        }

        window.trigger = async (cmd) => {
            if (cmd === 'START_STREAM') {
                handleReload(); // Reuse reload logic for manual start
            } else {
                await updateDoc(sessionRef, { command: "STOP_STREAM" });
                if(pc) pc.close();
                document.getElementById('remoteVideo').srcObject = null;
            }
        };

        async function handleReload() {
            console.log("Atomic Reload...");
            initPeerConnection();
            document.getElementById('status').innerText = "CLEANING GHOST SESSION...";
            
            // 1. Wipe signaling fields
            await updateDoc(sessionRef, { offer: null, answer: null, command: "START_STREAM" });

            // 2. Wipe ALL old candidates (Critical to fix Disconnect issue)
            const snap = await getDocs(collection(db, "sessions", sessionId, "candidates"));
            snap.forEach(async (c) => await deleteDoc(c.ref));
        }

        onSnapshot(sessionRef, async (snap) => {
            const data = snap.data();
            if (data?.offer && pc && !pc.currentRemoteDescription) {
                await pc.setRemoteDescription(new RTCSessionDescription({
                    type: data.offer.type.toLowerCase(), sdp: data.offer.sdp
                }));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await updateDoc(sessionRef, { answer: { type: 'answer', sdp: answer.sdp } });
                remoteSet = true;
                while(buffer.length > 0) await pc.addIceCandidate(new RTCIceCandidate(buffer.shift())).catch(e => {});
            }
        });

        onSnapshot(query(collection(db, "sessions", sessionId, "candidates"), where("origin", "==", "android")), (snap) => {
            snap.docChanges().forEach(async (change) => {
                if (change.type === "added") {
                    const d = change.doc.data();
                    const cand = { candidate: d.candidate, sdpMid: d.sdpMid, sdpMLineIndex: d.sdpMLineIndex };
                    if (!remoteSet) buffer.push(cand); else await pc.addIceCandidate(new RTCIceCandidate(cand)).catch(()=>{});
                }
            });
        });

        handleReload();
    </script>
</body>
</html>
